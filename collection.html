<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Collection - WebAR Botani Interaktif</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-svg@1.1.0/lib/qrcode.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        retro: {
                            red: '#F0523C',
                            blue: '#4A90E2',
                            yellow: '#F5D76E',
                            green: '#7ED321',
                            purple: '#BD10E0',
                            pink: '#FF4081',
                            bg: '#FDF7E5',
                        }
                    },
                    boxShadow: {
                        'retro': '4px 4px 0px 0px rgba(0,0,0,1)',
                        'retro-hover': '2px 2px 0px 0px rgba(0,0,0,1)',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Outfit:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #FDF7E5; /* retro-bg */
        }

        .font-pixel {
            font-family: 'Press Start 2P', cursive;
            line-height: 1.5;
        }

        .retro-card {
            border: 4px solid #000;
            border-radius: 8px;
            box-shadow: 4px 4px 0px 0px #000;
            transition: all 0.2s ease-in-out;
            background-color: #fff;
            color: #000;
            position: relative;
            overflow: hidden;
        }
        
        .retro-card:hover {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px 0px #000;
        }
        
        .flip-card-back:hover {
            transform: rotateY(180deg) translate(-2px, 2px) !important;
        }

        .retro-btn {
            border: 3px solid #000;
            border-radius: 4px;
            box-shadow: 3px 3px 0px 0px #000;
            transition: all 0.1s ease-in-out;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .retro-btn:active {
            transform: translate(3px, 3px);
            box-shadow: 0px 0px 0px 0px #000;
        }

        /* Flip Card CSS */
        .flip-card {
            perspective: 1000px;
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }
        .flip-card-back {
            transform: rotateY(180deg);
        }
    </style>
</head>
<body class="m-0 text-gray-900 bg-retro-bg">

    <!-- Navigation Bar -->
    <div class="sticky top-0 z-50">
        <nav class="bg-white border-b-4 border-black p-4 flex flex-wrap justify-between items-center shadow-md gap-2">
            <h1 class="font-pixel text-xl tracking-tighter cursor-pointer" onclick="window.location.href='index.html'">BOTANI<span class="text-retro-green">.AR</span></h1>
            <div class="flex gap-2 flex-wrap">
                <button onclick="window.location.href='index.html'" class="retro-btn bg-retro-blue text-white px-3 py-1 text-sm">SCAN QR</button>
                <button onclick="window.location.href='drop.html'" class="retro-btn bg-retro-purple text-white px-3 py-1 text-sm">DROP</button>
                <button onclick="window.location.href='collection.html'" class="retro-btn bg-retro-yellow px-3 py-1 text-sm">COLLECTION</button>
                <button onclick="window.location.href='draw.html'" class="retro-btn bg-retro-pink text-white px-3 py-1 text-sm">DRAW</button>
                <button id="auth-btn" onclick="window.handleAuthBtnClick()" class="retro-btn bg-gray-200 px-3 py-1 text-sm">LOGIN</button>
            </div>
        </nav>
    </div>

    <!-- Main Content Area -->
    <div class="container mx-auto p-4 max-w-5xl mt-8">
        <!-- Collection View -->
        <div id="view-collection">
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                <h2 class="text-3xl font-black uppercase" style="-webkit-text-stroke: 1px black; color: white; text-shadow: 3px 3px 0 #000;">Plant Collection</h2>
                <div class="flex gap-2">
                    <button id="tab-endemic" class="retro-btn bg-retro-green text-white px-4 py-2 active-tab shadow-none translate-y-1 translate-x-1" onclick="switchTab('endemic')">Tanaman Endemik</button>
                    <button id="tab-user" class="retro-btn bg-white px-4 py-2" onclick="switchTab('user')">Karya Pengguna</button>
                </div>
            </div>

            <!-- Grid for Endemic Plants -->
            <div id="grid-endemic" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-6">
                <!-- Cards will be populated by JS -->
            </div>

            <!-- Grid for User Drawings -->
            <div id="grid-user" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-6 hidden">
                <!-- Cards will be populated by JS -->
            </div>
        </div>
    </div>

    <!-- Auth Modal -->
    <div id="auth-modal" class="fixed inset-0 z-[100] bg-black bg-opacity-70 hidden flex items-center justify-center p-4">
        <div class="retro-card bg-retro-yellow p-6 md:p-8 max-w-md w-full relative">
            <button onclick="window.toggleAuthModal()" class="absolute top-2 right-2 w-8 h-8 flex items-center justify-center retro-btn bg-white font-black text-xl leading-none">&times;</button>
            <h2 id="auth-title" class="font-pixel text-xl mb-6 text-center">LOGIN</h2>
            
            <form id="auth-form" onsubmit="window.handleAuth(event)" class="flex flex-col gap-4">
                <div>
                    <label class="block font-bold mb-1">Email</label>
                    <input type="email" id="auth-email" required class="w-full border-4 border-black rounded px-3 py-2">
                </div>
                <div>
                    <label class="block font-bold mb-1">Password</label>
                    <input type="password" id="auth-password" required class="w-full border-4 border-black rounded px-3 py-2">
                </div>
                
                <div class="mt-2">
                    <button type="submit" id="auth-submit-btn" onclick="window.setAuthAction('login')" class="retro-btn bg-retro-blue text-white w-full py-3 text-lg">Login</button>
                </div>
            </form>
            <div class="mt-4 text-center">
                <p class="text-sm font-bold">
                    <span id="auth-toggle-desc">Belum punya akun?</span> 
                    <button onclick="window.toggleAuthMode()" id="auth-toggle-btn" class="text-retro-blue cursor-pointer underline hover:text-retro-pink bg-transparent border-none p-0 ml-1">Daftar di sini</button>
                </p>
            </div>
            <p id="auth-message" class="mt-4 text-center font-bold text-sm hidden"></p>
        </div>
    </div>

    <script type="module" src="js/supabase-db.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Init Collection Mode directly
        window.addEventListener('load', () => {
            if (typeof loadEndemicPlants === 'function') {
                loadEndemicPlants();
            }
        });
    </script>
</body>
</html>
